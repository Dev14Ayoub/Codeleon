# Production stack for the Hetzner VPS.
#
# Design principles:
#   - Every service lives on a private Docker network. The only port that
#     reaches the host is Caddy's :80, and even that is bound to the
#     Tailscale IP so the public internet sees nothing.
#   - Postgres / Redis / Qdrant / Ollama are unpublished — internal traffic
#     between containers uses Docker DNS (e.g. http://ollama:11434).
#   - Backend reads its config from environment variables interpolated
#     from .env.production. No secrets in this file.
#   - Volumes survive container recreation, so a `docker compose up -d`
#     never wipes the database.
#
# Bring up:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: codeleon-postgres
    environment:
      POSTGRES_DB: codeleon
      POSTGRES_USER: codeleon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeleon"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: codeleon-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: codeleon-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: codeleon-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_NUM_PARALLEL: 1
      # On 8 GB RAM with a 7B chat model loaded, keeping a second model
      # resident (e.g. nomic-embed-text during indexing) tips the host into
      # swap and stalls inference. Cap at 1 so Ollama unloads the embedder
      # after an index run and frees room for the chat model.
      OLLAMA_MAX_LOADED_MODELS: 1
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Must match the GID of the host's `docker` group (check with
        # `getent group docker`). Lets the non-root codeleon user inside
        # the container talk to the bind-mounted socket. Default 983 is
        # what Ubuntu 24.04+ docker.io packages use; override via .env
        # if your host differs.
        DOCKER_GID: ${DOCKER_GID:-983}
    container_name: codeleon-backend
    # The code runner shells out to `docker run ...` against the host's
    # daemon. Mounting the socket gives the backend container the power
    # to spawn (and kill) sibling containers. On this Tailscale-only,
    # single-tenant VM the trade-off is acceptable; on a multi-tenant
    # host this would be a hard no — use a dedicated runner service.
    #
    # The runs bind mount uses the SAME absolute path on host and inside
    # the container so the Maven and Nix runners can pass `-v <path>:/workspace`
    # to the host daemon and have it find the files we just wrote.
    # The host dir must be writable by uid 999 (the codeleon user):
    #   sudo mkdir -p /opt/codeleon/runs && sudo chown 999:999 /opt/codeleon/runs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/codeleon/runs:/opt/codeleon/runs
    environment:
      RUNNER_WORKSPACE_BASE_DIR: /opt/codeleon/runs

      # Interactive terminal (xterm.js + bash sandbox). Capped tighter than
      # the defaults because this 8 GB VM also keeps Ollama resident: at most
      # two concurrent shells, 384 MB each, killed after 5 min idle.
      RUNNER_TERMINAL_ENABLED: "true"
      RUNNER_TERMINAL_MEMORY_MB: "384"
      RUNNER_TERMINAL_MAX_CONCURRENT: "2"
      # Spring datasource → internal Postgres via Docker DNS.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codeleon
      SPRING_DATASOURCE_USERNAME: codeleon
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # Redis for sessions / cache.
      SPRING_DATA_REDIS_HOST: redis

      # AI plumbing — points at the internal Ollama + Qdrant.
      OLLAMA_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5-coder:1.5b}
      OLLAMA_AGENT_MODEL: ${OLLAMA_AGENT_MODEL:-qwen2.5-coder:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      # Bumped so the first-token wait on a cold-loaded 7B (paging in from
      # disk, building the KV cache) doesn't get cut by an HTTP timeout.
      OLLAMA_REQUEST_TIMEOUT: 600s
      # Context window sent as options.num_ctx on every chat call. 8192 KV
      # cache costs ~1.5 GB on a 7B Q4; 4096 fits the assembled RAG prompt
      # and frees real headroom on 8 GB.
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-4096}
      QDRANT_URL: http://qdrant:6333
      AI_ENABLED: "true"

      # Auth — JWT secret + bootstrap admin from .env.production.
      JWT_SECRET: ${JWT_SECRET}
      CODELEON_BOOTSTRAP_ADMIN_EMAIL: ${ADMIN_EMAIL}

      # Token lifetimes. application.yml defaults the access token to 15 min,
      # which is short for long editing/indexing sessions on this single-user
      # tailnet deployment — a too-frequent refresh cycle is where the
      # recurring "Authentication required" came from. These env vars were NOT
      # previously forwarded, so setting them in .env had no effect; wire them
      # here. Access 2 h, refresh 30 days. Override via .env if desired.
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-7200000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-2592000000}

      # First entry is the SPA origin that the OAuth2 success handler
      # redirects the browser to after a successful GitHub/Google login
      # (see OAuth2LoginSuccessHandler#frontendOrigin). Without this the
      # handler falls back to the default localhost:5173 — which only
      # works in dev. Override via .env if you ever expose a public domain.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://100.106.32.95}

      # OAuth2 social login credentials. Leaving any pair blank disables
      # that provider — OAuth2ClientConfig only registers a client when
      # both id AND secret are non-blank. Forwarded from .env so the
      # backend container actually sees them; without these lines the
      # interpolation only happens in the compose file itself.
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # Required so Caddy /api/* routing maps to the right Spring path.
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SERVER_SERVLET_CONTEXT_PATH: /api/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # `internal` to reach Postgres/Redis/Qdrant/Ollama; `preview` to reach the
    # ephemeral live-preview dev-server containers the backend spawns. Preview
    # containers join ONLY `preview`, so untrusted user code cannot reach the
    # data tier — this isolation is the key security control of the webview.
    networks:
      - internal
      - preview
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        # Caddy proxies /api/* to backend, so the SPA uses the relative
        # path and is reachable from any host (Tailscale IP, domain, etc.).
        VITE_API_BASE_URL: /api/v1
    container_name: codeleon-frontend
    networks:
      - internal
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: codeleon-caddy
    # Bind explicitly to the Tailscale IP so Caddy is unreachable from the
    # public internet even if UFW is misconfigured. TAILSCALE_IP comes from
    # .env.production; if unset, Docker binds to 0.0.0.0 (and UFW is then
    # the only line of defence — still safe but less belt-and-suspenders).
    ports:
      - "${TAILSCALE_IP:-0.0.0.0}:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      - backend
      - frontend

networks:
  internal:
    driver: bridge
  # Isolated network for live-preview dev-server containers. NO data service is
  # attached here; only the backend bridges into it to reverse-proxy previews.
  # The compose project prefix makes the real network name `codeleon_preview`
  # (override via RUNNER_PREVIEW_NETWORK if your project name differs).
  preview:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  caddy_data:
  caddy_config:
