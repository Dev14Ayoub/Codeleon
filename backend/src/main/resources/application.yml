server:
  port: ${BACKEND_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: codeleon-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:codeleon}}
    username: ${POSTGRES_USER:codeleon}
    password: ${POSTGRES_PASSWORD:codeleon_dev_pwd}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

codeleon:
  security:
    jwt-secret: ${JWT_SECRET:replace_me_with_a_long_random_string_min_64_chars_for_HS256_security}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth:
    # Both providers are optional. Leave a client-id blank to disable that
    # provider; the OAuth2 filter chain only mounts when at least one is set.
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  admin:
    # Email of the account to promote to ADMIN at startup. Leave blank to
    # disable the bootstrap; once at least one admin exists, role changes
    # are managed via the /admin dashboard.
    bootstrap-email: ${CODELEON_BOOTSTRAP_ADMIN_EMAIL:}
  runner:
    enabled: ${RUNNER_ENABLED:true}
    python-image: ${RUNNER_PYTHON_IMAGE:python:3.12-slim}
    timeout-ms: ${RUNNER_TIMEOUT_MS:8000}
    memory-mb: ${RUNNER_MEMORY_MB:256}
    cpus: ${RUNNER_CPUS:0.5}
    pids-limit: ${RUNNER_PIDS_LIMIT:64}
    max-output-bytes: ${RUNNER_MAX_OUTPUT_BYTES:65536}
  ai:
    enabled: ${AI_ENABLED:false}
    ollama:
      url: ${OLLAMA_URL:http://localhost:11434}
      chat-model: ${OLLAMA_CHAT_MODEL:qwen2.5-coder:0.5b}
      embed-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
      request-timeout: ${OLLAMA_REQUEST_TIMEOUT:60s}
    qdrant:
      url: ${QDRANT_URL:http://localhost:6333}
      collection: ${QDRANT_COLLECTION:codeleon-room-files}
      vector-size: ${QDRANT_VECTOR_SIZE:768}
      distance: ${QDRANT_DISTANCE:Cosine}
