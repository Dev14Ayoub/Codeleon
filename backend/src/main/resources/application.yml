server:
  port: ${BACKEND_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: codeleon-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:codeleon}}
    username: ${POSTGRES_USER:codeleon}
    password: ${POSTGRES_PASSWORD:codeleon_dev_pwd}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

codeleon:
  security:
    jwt-secret: ${JWT_SECRET:replace_me_with_a_long_random_string_min_64_chars_for_HS256_security}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth:
    # Both providers are optional. Leave a client-id blank to disable that
    # provider; the OAuth2 filter chain only mounts when at least one is set.
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  admin:
    # Email of the account to promote to ADMIN at startup. Leave blank to
    # disable the bootstrap; once at least one admin exists, role changes
    # are managed via the /admin dashboard.
    bootstrap-email: ${CODELEON_BOOTSTRAP_ADMIN_EMAIL:}
  runner:
    enabled: ${RUNNER_ENABLED:true}
    python-image: ${RUNNER_PYTHON_IMAGE:python:3.12-slim}
    java-image: ${RUNNER_JAVA_IMAGE:eclipse-temurin:21-jdk}
    maven-image: ${RUNNER_MAVEN_IMAGE:maven:3.9-eclipse-temurin-21}
    maven-cache-volume: ${RUNNER_MAVEN_CACHE_VOLUME:codeleon-maven-cache}
    timeout-ms: ${RUNNER_TIMEOUT_MS:8000}
    java-timeout-ms: ${RUNNER_JAVA_TIMEOUT_MS:25000}
    maven-timeout-ms: ${RUNNER_MAVEN_TIMEOUT_MS:120000}
    memory-mb: ${RUNNER_MEMORY_MB:256}
    maven-memory-mb: ${RUNNER_MAVEN_MEMORY_MB:768}
    cpus: ${RUNNER_CPUS:0.5}
    pids-limit: ${RUNNER_PIDS_LIMIT:64}
    max-output-bytes: ${RUNNER_MAX_OUTPUT_BYTES:65536}
    nix:
      enabled: ${RUNNER_NIX_ENABLED:true}
      image: ${RUNNER_NIX_IMAGE:nixos/nix:2.24.11}
      cache-volume: ${RUNNER_NIX_CACHE_VOLUME:codeleon-nix-store}
      maven-cache-volume: ${RUNNER_NIX_MAVEN_CACHE_VOLUME:codeleon-maven-cache}
      npm-cache-volume: ${RUNNER_NIX_NPM_CACHE_VOLUME:codeleon-npm-cache}
      pip-cache-volume: ${RUNNER_NIX_PIP_CACHE_VOLUME:codeleon-pip-cache}
      timeout-ms: ${RUNNER_NIX_TIMEOUT_MS:180000}
      memory-mb: ${RUNNER_NIX_MEMORY_MB:1024}
      cpus: ${RUNNER_NIX_CPUS:1.0}
      pids-limit: ${RUNNER_NIX_PIDS_LIMIT:128}
      max-output-bytes: ${RUNNER_NIX_MAX_OUTPUT_BYTES:131072}
  ai:
    enabled: ${AI_ENABLED:false}
    ollama:
      url: ${OLLAMA_URL:http://localhost:11434}
      chat-model: ${OLLAMA_CHAT_MODEL:qwen2.5-coder:0.5b}
      # Empty by default → AiProperties falls back to chat-model. Override
      # to a tool-capable model (e.g. qwen2.5-coder:7b) when enabling
      # agent mode in production.
      agent-model: ${OLLAMA_AGENT_MODEL:}
      embed-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
      # 4 minutes — small CPU-only models can take 2-3 min for a long-ish
      # response. 60s was killing chats halfway through inference and
      # surfacing as a "Chat failed" toast on the frontend.
      request-timeout: ${OLLAMA_REQUEST_TIMEOUT:240s}
    qdrant:
      url: ${QDRANT_URL:http://localhost:6333}
      collection: ${QDRANT_COLLECTION:codeleon-room-files}
      vector-size: ${QDRANT_VECTOR_SIZE:768}
      distance: ${QDRANT_DISTANCE:Cosine}
